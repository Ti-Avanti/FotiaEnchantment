<svg width="1180" height="520" viewBox="0 0 1180 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic lore preview</title>
  <desc id="desc">A stylized Minecraft tooltip showing dynamic enchantment lore with rarity colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171225"/>
      <stop offset="0.55" stop-color="#101722"/>
      <stop offset="1" stop-color="#2D1F18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#7FFFD4" flood-opacity="0.26"/>
    </filter>
  </defs>
  <rect width="1180" height="520" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Dynamic book and item lore</text>
  <text x="60" y="116" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">Descriptions are calculated from the actual level and effect values before the packet reaches the client.</text>
  <g filter="url(#glow)" transform="translate(98 165)">
    <rect width="440" height="270" rx="16" fill="#12041D" stroke="#5B2B73" stroke-width="3"/>
    <rect x="24" y="25" width="62" height="62" rx="10" fill="#B66DFF"/>
    <rect x="35" y="36" width="40" height="40" rx="6" fill="#F5F0FF"/>
    <text x="108" y="49" fill="#55FF55" font-size="24" font-family="Consolas, monospace" font-weight="700">刃舞节奏 IV</text>
    <text x="108" y="82" fill="#55FF55" font-size="24" font-family="Consolas, monospace" font-weight="700">Blade Tempo IV</text>
    <text x="34" y="130" fill="#AAAAAA" font-size="20" font-family="Consolas, monospace">4级：有 32% 概率提升速度 4 级，</text>
    <text x="34" y="160" fill="#AAAAAA" font-size="20" font-family="Consolas, monospace">持续 7 秒。</text>
    <text x="34" y="208" fill="#FF55FF" font-size="20" font-family="Consolas, monospace">连击时有概率短暂提升移动速度。</text>
  </g>
  <g transform="translate(650 174)">
    <rect width="430" height="248" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="32" y="54" fill="#FFE6BD" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Lore renderer</text>
    <text x="32" y="96" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">• hides vanilla duplicate lines</text>
    <text x="32" y="130" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">• preserves curse red text</text>
    <text x="32" y="164" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">• uses rarity colors</text>
    <text x="32" y="198" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">• calculates chance, duration and level</text>
  </g>
</svg>
