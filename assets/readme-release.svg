<svg width="1180" height="420" viewBox="0 0 1180 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub release updater</title>
  <desc id="desc">The plugin checks GitHub Releases to notify admins about newer versions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1520"/>
      <stop offset="1" stop-color="#25313A"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF8C42"/>
      <stop offset="1" stop-color="#7FFFD4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1180" height="420" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Release-based update checks</text>
  <text x="60" y="116" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">A published GitHub Release makes the in-game updater useful immediately.</text>
  <path d="M175 244H1004" stroke="url(#line)" stroke-width="7" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="76" y="178" width="210" height="132" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="113" y="228" fill="#FFE6BD" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Server starts</text>
    <text x="112" y="264" fill="#AFC0CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">delayed async check</text>
    <rect x="348" y="178" width="230" height="132" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="389" y="228" fill="#D8FFF3" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GitHub API</text>
    <text x="388" y="264" fill="#AFC0CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">releases/latest</text>
    <rect x="640" y="178" width="230" height="132" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="681" y="228" fill="#FFE6BD" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Compare tags</text>
    <text x="680" y="264" fill="#AFC0CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">v1.0.0 > snapshot</text>
    <rect x="932" y="178" width="180" height="132" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="967" y="228" fill="#D8FFF3" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Notify</text>
    <text x="966" y="264" fill="#AFC0CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">console and ops</text>
  </g>
  <circle cx="181" cy="244" r="10" fill="#FF8C42"/>
  <circle cx="463" cy="244" r="10" fill="#FFD166"/>
  <circle cx="755" cy="244" r="10" fill="#78FFD6"/>
  <circle cx="1022" cy="244" r="10" fill="#54A7FF"/>
</svg>
