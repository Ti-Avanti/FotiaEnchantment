<svg width="1180" height="520" viewBox="0 0 1180 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FotiaEnchantment architecture</title>
  <desc id="desc">A visual overview of the plugin's config-driven enchantment pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1520"/>
      <stop offset="0.55" stop-color="#1C2833"/>
      <stop offset="1" stop-color="#33251D"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD166"/>
      <stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#78FFD6"/>
      <stop offset="1" stop-color="#54A7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1180" height="520" rx="32" fill="url(#bg)"/>
  <text x="60" y="74" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Config-driven enchantment pipeline</text>
  <text x="60" y="111" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">YAML resources become runtime enchantments, then PacketEvents rewrites client lore with the final player language.</text>
  <g filter="url(#shadow)">
    <rect x="65" y="165" width="220" height="188" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="95" y="208" fill="#FFE6BD" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">YAML configs</text>
    <text x="95" y="247" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">enchantments/*.yml</text>
    <text x="95" y="278" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">gui/*.yml</text>
    <text x="95" y="309" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">lang/*/*.yml</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="370" y="165" width="220" height="188" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="400" y="208" fill="#D8FFF3" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Runtime registry</text>
    <text x="400" y="247" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">113 enchantments</text>
    <text x="400" y="278" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">162 triggers</text>
    <text x="400" y="309" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">291 effects</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="675" y="165" width="220" height="188" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="705" y="208" fill="#FFE6BD" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Effect engine</text>
    <text x="705" y="247" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">conditions</text>
    <text x="705" y="278" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">actions</text>
    <text x="705" y="309" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">cooldowns</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="980" y="165" width="135" height="188" rx="18" fill="#111A25" stroke="#33485D"/>
    <text x="1011" y="208" fill="#D8FFF3" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Client</text>
    <text x="1011" y="247" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">GUI</text>
    <text x="1011" y="278" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">lore</text>
    <text x="1011" y="309" fill="#AFC0CF" font-size="17" font-family="Segoe UI, Arial, sans-serif">books</text>
  </g>
  <path d="M297 259H357" stroke="url(#orange)" stroke-width="5" stroke-linecap="round"/>
  <path d="M602 259H662" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>
  <path d="M907 259H967" stroke="url(#orange)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="327" cy="259" r="7" fill="#FFB05A"/>
  <circle cx="632" cy="259" r="7" fill="#78FFD6"/>
  <circle cx="937" cy="259" r="7" fill="#FFB05A"/>
  <rect x="62" y="408" width="1056" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="98" y="444" fill="#F8FAFC" font-size="19" font-family="Segoe UI, Arial, sans-serif">Trigger -> Conditions -> Effects -> Dynamic description -> Packet lore rewrite</text>
</svg>
