<svg width="1180" height="640" viewBox="0 0 1180 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GUI previews</title>
  <desc id="desc">Stylized previews of the FotiaEnchantment encyclopedia, admin, codex and disenchant GUIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10151E"/>
      <stop offset="1" stop-color="#202B32"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7FFFD4"/>
      <stop offset="1" stop-color="#54A7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1180" height="640" rx="32" fill="url(#bg)"/>
  <text x="58" y="76" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Configurable GUI suite</text>
  <text x="58" y="113" fill="#C7D1DD" font-size="18" font-family="Segoe UI, Arial, sans-serif">Every GUI is backed by a dedicated layout file under gui/*.yml.</text>
  <g filter="url(#shadow)" transform="translate(58 156)">
    <rect width="495" height="190" rx="18" fill="#111A25" stroke="#33485D"/>
    <rect x="20" y="24" width="455" height="34" rx="10" fill="#0B111A"/>
    <text x="36" y="47" fill="#FFE6BD" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">附魔图鉴 - Encyclopedia</text>
    <g transform="translate(29 78)">
      <rect width="44" height="44" rx="8" fill="url(#gold)"/>
      <rect x="55" width="44" height="44" rx="8" fill="#2A3542"/>
      <rect x="110" width="44" height="44" rx="8" fill="#2A3542"/>
      <rect x="165" width="44" height="44" rx="8" fill="url(#blue)"/>
      <rect x="220" width="44" height="44" rx="8" fill="#2A3542"/>
      <rect x="275" width="44" height="44" rx="8" fill="#2A3542"/>
      <rect x="330" width="44" height="44" rx="8" fill="url(#gold)"/>
      <rect x="385" width="44" height="44" rx="8" fill="#2A3542"/>
    </g>
    <text x="29" y="151" fill="#C7D1DD" font-size="16" font-family="Segoe UI, Arial, sans-serif">Categories, pages, effect summaries, item applicability</text>
  </g>
  <g filter="url(#shadow)" transform="translate(627 156)">
    <rect width="495" height="190" rx="18" fill="#111A25" stroke="#33485D"/>
    <rect x="20" y="24" width="455" height="34" rx="10" fill="#0B111A"/>
    <text x="36" y="47" fill="#D8FFF3" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">附魔管理 - Admin</text>
    <g transform="translate(29 78)">
      <rect width="44" height="44" rx="8" fill="#2A3542"/>
      <rect x="55" width="44" height="44" rx="8" fill="url(#gold)"/>
      <rect x="110" width="44" height="44" rx="8" fill="url(#gold)"/>
      <rect x="165" width="44" height="44" rx="8" fill="url(#blue)"/>
      <rect x="220" width="44" height="44" rx="8" fill="#2A3542"/>
      <rect x="275" width="44" height="44" rx="8" fill="url(#gold)"/>
      <rect x="330" width="44" height="44" rx="8" fill="url(#gold)"/>
      <rect x="385" width="44" height="44" rx="8" fill="#2A3542"/>
    </g>
    <text x="29" y="151" fill="#C7D1DD" font-size="16" font-family="Segoe UI, Arial, sans-serif">Left click to enchant, right click to get an enchanted book</text>
  </g>
  <g filter="url(#shadow)" transform="translate(58 390)">
    <rect width="495" height="190" rx="18" fill="#111A25" stroke="#33485D"/>
    <rect x="20" y="24" width="455" height="34" rx="10" fill="#0B111A"/>
    <text x="36" y="47" fill="#FFE6BD" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">星芒魔典 - Codex</text>
    <circle cx="96" cy="109" r="28" fill="url(#blue)"/>
    <rect x="168" y="84" width="160" height="50" rx="12" fill="url(#gold)"/>
    <rect x="356" y="88" width="70" height="42" rx="10" fill="#2A3542"/>
    <text x="29" y="151" fill="#C7D1DD" font-size="16" font-family="Segoe UI, Arial, sans-serif">Reveal random-quality codex items into enchanted books</text>
  </g>
  <g filter="url(#shadow)" transform="translate(627 390)">
    <rect width="495" height="190" rx="18" fill="#111A25" stroke="#33485D"/>
    <rect x="20" y="24" width="455" height="34" rx="10" fill="#0B111A"/>
    <text x="36" y="47" fill="#D8FFF3" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">祛魔 - Disenchant</text>
    <rect x="64" y="85" width="62" height="62" rx="12" fill="url(#blue)"/>
    <path d="M165 116H328" stroke="#FFB05A" stroke-width="5" stroke-linecap="round"/>
    <rect x="366" y="85" width="62" height="62" rx="12" fill="url(#gold)"/>
    <text x="29" y="169" fill="#C7D1DD" font-size="16" font-family="Segoe UI, Arial, sans-serif">Place equipment and stone, choose an enchantment, confirm</text>
  </g>
</svg>
