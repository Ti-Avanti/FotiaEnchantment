# ============================================
# 附魔图鉴 GUI
# EN: Enchantment guide GUI
# ============================================
# layout 每行必须为 9 个字符，字符通过 roles 绑定到功能槽位。
# EN: Each layout row must contain 9 characters; roles bind characters to functional slots.
# 文本支持 MiniMessage、旧颜色码 &/§、&#RRGGBB 和 lang:语言键。
# EN: Text supports MiniMessage, legacy &/§ color codes, &#RRGGBB, and lang: language keys.
# items 下的物品支持 material、modeldata、tooltip-style、itemmodel、name、lore。
# EN: Items support material, modeldata, tooltip-style, itemmodel, name, and lore.
# 可用占位符由对应功能槽位决定，例如 {active_prefix}、{category_name}、{rarity_color}、{effect_lines}。
# EN: Available placeholders depend on each functional slot, such as {active_prefix}, {category_name}, {rarity_color}, and {effect_lines}.

# GUI 行数，必须和 layout 的行数一致；每行固定 9 格。
# EN: GUI row count; must match the number of layout rows, and each row is 9 slots wide.
rows: 6

# GUI 标题。推荐使用 lang:语言键，方便多语言。
# EN: GUI title. Using lang: keys is recommended for multi-language support.
title: "lang:guide-gui.title"

# 是否自动用 background 物品填充没有功能角色的空槽。
# EN: Whether empty non-functional slots should be filled with the background item.
fill-empty: true

# GUI 布局。每个字符会通过 roles 绑定到一个功能槽位；相同字符可以出现多次。
# EN: GUI layout. Each character is mapped to a functional slot through roles; the same character may appear multiple times.
layout:
  - "#A#MRDTU#"
  - "EEEEEEEEE"
  - "EEEEEEEEE"
  - "EEEEEEEEE"
  - "EEEEEEEEE"
  - "P###X###N"

# 角色绑定。修改字符时，需要同时修改 layout 中对应字符，否则该功能槽位不会出现。
# EN: Role bindings. When changing a character, update the matching layout character or the functional slot will not appear.
roles:
  background: "#"
  category-all: "A"
  category-melee: "M"
  category-ranged: "R"
  category-armor: "D"
  category-tools: "T"
  category-universal: "U"
  enchantments: "E"
  previous-page: "P"
  close: "X"
  next-page: "N"

# 各角色的显示物品配置。功能槽位的交互逻辑由角色名决定，material 只影响显示外观。
# EN: Display item configuration for each role. Interaction logic is decided by the role name; material only changes appearance.
items:
  background:
    material: BLACK_STAINED_GLASS_PANE
    name: "<!i><dark_gray> "
    lore: []

  category-all:
    material: BOOKSHELF
    name: "{active_prefix}{category_name}"
    lore:
      - "lang:guide-gui.click-to-switch-category"

  category-melee:
    material: IRON_SWORD
    name: "{active_prefix}{category_name}"
    lore:
      - "lang:guide-gui.click-to-switch-category"

  category-ranged:
    material: BOW
    name: "{active_prefix}{category_name}"
    lore:
      - "lang:guide-gui.click-to-switch-category"

  category-armor:
    material: IRON_CHESTPLATE
    name: "{active_prefix}{category_name}"
    lore:
      - "lang:guide-gui.click-to-switch-category"

  category-tools:
    material: IRON_PICKAXE
    name: "{active_prefix}{category_name}"
    lore:
      - "lang:guide-gui.click-to-switch-category"

  category-universal:
    material: NETHER_STAR
    name: "{active_prefix}{category_name}"
    lore:
      - "lang:guide-gui.click-to-switch-category"

  enchantment:
    material: ENCHANTED_BOOK
    glow: true
    name: "lang:guide-gui.enchantment-name"
    lore:
      - "lang:guide-gui.rarity-line"
      - "lang:guide-gui.category-line"
      - "lang:guide-gui.group-line"
      - "lang:guide-gui.max-level"
      - "lang:guide-gui.applicable-line"
      - "{curse_line}"
      - ""
      - "{description_lines}"
      - ""
      - "{effect_lines}"
    description-line: "<!i><dark_gray>  - <gray>{description}"
    effect-action-line: "lang:guide-gui.effect-action-line"

  previous-page:
    material: ARROW
    name: "lang:guide-gui.prev-page"
    lore:
      - "lang:guide-gui.jump-page"

  close:
    material: BARRIER
    name: "lang:guide-gui.close"
    lore:
      - "lang:guide-gui.close-hint"
      - "lang:guide-gui.page-info"

  next-page:
    material: ARROW
    name: "lang:guide-gui.next-page"
    lore:
      - "lang:guide-gui.jump-page"
