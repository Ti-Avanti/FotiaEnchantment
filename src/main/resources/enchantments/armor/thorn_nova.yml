# ============================================
# 荆棘新星 (Thorn Nova)
# 受到攻击时有概率对周围敌人造成范围伤害
# 周围有多个敌人时触发概率更高
# ============================================

# 附魔ID（唯一标识，不可重复）
id: thorn_nova

# 是否启用此附魔
enabled: true

# 最大等级
max-level: 3

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
rarity: aureate

# 所属附魔组（对应 groups.yml）
group: defensive

# 可应用的物品类型
applicable-items:
  - CHESTPLATE

# 冲突的附魔ID列表
conflicts: []

# 获取方式配置
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率，较稀有）
enchanting-table-weight: 5

# 星芒魔典抽取池配置
codex-pools:
  aureate: 10
  divine: 2

# 效果配置（核心：Trigger → Condition → Effect 管道）
effects:
  # 受到攻击时范围反击
  - trigger: TAKE_ENTITY_DAMAGE
    conditions:
      # 概率触发
      - type: chance
        value: "{level} * 15"
      # 附近有玩家/敌人时触发（范围5格内至少有2个实体）
      - type: players_nearby
        radius: 5
        min-count: 2
    actions:
      # 小范围爆炸造成伤害（低威力，不破坏方块）
      - type: EXPLODE
        power: "{level} * 0.5"
        break-blocks: false
      # 对周围造成真实伤害
      - type: TRUE_DAMAGE
        value: "{level} * 1.0"
      # 荆棘粒子特效（绿色粒子扩散）
      - type: PARTICLE
        particle: HAPPY_VILLAGER
        count: 20
      # 播放荆棘音效
      - type: SOUND
        sound: entity.evoker_fangs.attack
        volume: 0.7
        pitch: 1.2
    # 冷却时间（tick），较长冷却防止连续触发
    cooldown: 160
