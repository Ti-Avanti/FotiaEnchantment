# ============================================
# 生命源泉 (Vitality Spring)
# 每5秒自动检测血量，低于阈值时持续恢复生命
# 被动防御型附魔，提供持续的生存能力
# ============================================

# 附魔ID（唯一标识，不可重复）
id: vitality_spring

# 是否启用此附魔
enabled: true

# 最大等级
max-level: 5

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
rarity: radiant

# 所属附魔组（对应 groups.yml）
group: defensive

# 可应用的物品类型
applicable-items:
  - CHESTPLATE
  - LEGGINGS
  - BOOTS

# 冲突的附魔ID列表
conflicts: []

# 获取方式配置
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率）
enchanting-table-weight: 12

# 星芒魔典抽取池配置
codex-pools:
  radiant: 12
  aureate: 6

# 效果配置（核心：Trigger → Condition → Effect 管道）
effects:
  # 每5秒定时检查，低血量时恢复
  - trigger: TIMER_5S
    conditions:
      # 当自身血量低于60%时触发恢复
      - type: health_below
        value: "60"
    actions:
      # 恢复生命值
      - type: HEAL
        value: "{level} * 0.5"
      # 治愈粒子特效（绿色心形）
      - type: PARTICLE
        particle: HEART
        count: 3
