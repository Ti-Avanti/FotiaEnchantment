# ============================================
# 霜冻护盾 (Frost Shield)
# 受到攻击且血量较低时，冻结攻击者并减速
# ============================================

# 附魔ID（唯一标识，不可重复）
id: frost_shield

# 是否启用此附魔
enabled: true

# 最大等级
max-level: 4

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
rarity: radiant

# 所属附魔组（对应 groups.yml）
group: ice

# 可应用的物品类型
applicable-items:
  - CHESTPLATE
  - LEGGINGS

# 冲突的附魔ID列表（与烈焰之刃互斥）
conflicts:
  - blazing_blade

# 获取方式配置
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率）
enchanting-table-weight: 10

# 星芒魔典抽取池配置
codex-pools:
  radiant: 10
  aureate: 5

# 效果配置（核心：Trigger → Condition → Effect 管道）
effects:
  # 受到实体攻击且血量低时触发
  - trigger: TAKE_ENTITY_DAMAGE
    conditions:
      # 概率触发
      - type: chance
        value: "{level} * 15"
      # 当自身血量低于50%时触发（危机保护）
      - type: health_below
        value: "50"
    actions:
      # 给攻击者施加缓慢效果
      - type: ADD_POTION_TARGET
        potion: SLOWNESS
        duration: "{level} * 40"
        amplifier: "{level} - 1"
      # 冰霜粒子特效
      - type: PARTICLE
        particle: SNOWFLAKE
        count: 15
      # 播放冰冻音效
      - type: SOUND
        sound: block.powder_snow.step
        volume: 0.8
        pitch: 0.6
    # 冷却时间（tick）
    cooldown: 120
