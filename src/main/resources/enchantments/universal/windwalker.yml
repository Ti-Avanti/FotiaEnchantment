# ============================================
# 御风 (Windwalker)
# 持有/穿戴时持续提供移动速度加成
# 被动型附魔，持续生效无需触发
# ============================================

# 附魔ID（唯一标识，不可重复）
id: windwalker

# 是否启用此附魔
enabled: true

# 最大等级
max-level: 3

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
rarity: moonlit

# 所属附魔组（对应 groups.yml）
group: movement

# 可应用的物品类型
applicable-items:
  - BOOTS
  - LEGGINGS

# 冲突的附魔ID列表
conflicts: []

# 获取方式配置
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率）
enchanting-table-weight: 16

# 星芒魔典抽取池配置
codex-pools:
  moonlit: 14
  radiant: 7

# 效果配置（核心：Trigger → Condition → Effect 管道）
effects:
  # 持续持有/穿戴时提供速度加成
  - trigger: HOLD
    conditions: []
    actions:
      # 提供移动速度加成（百分比增加）
      - type: SPEED_BOOST
        value: "{level} * 10"
      # 风之粒子特效（轻微的视觉反馈）
      - type: PARTICLE
        particle: CLOUD
        count: 2
