# ============================================
# 批量扩展附魔：幸运脉冲 (Fortune Pulse)
# EN: Bulk extended enchantment: Fortune Pulse (幸运脉冲)
# ============================================
# === FotiaEnchantment 100 enchantment expansion ===

id: fortune_pulse
enabled: true
curse: false
max-level: 5
rarity: aureate
group: mining
category: tools

applicable-items:
  - PICKAXE

# 矿石额外掉落附魔互斥，并与精准采集冲突，避免重复结算掉落。
# EN: Mutually exclusive with other ore bonus-drop enchantments and Silk Touch.
conflicts:
  - ore_harvest
  - gem_sense
  - deep_prospector
  - stone_eater
  - quarry_echo
  - bountiful
  - minecraft:silk_touch

obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  enchanting-table-weight: 6
villager-trade-price-range:
  - 28
  - 64

codex-pools:
  aureate: 10
  divine: 3

effects:
  - trigger: MINE_ORE
    cooldown: 100
    conditions:
      - type: chance
        value: "{level} * 7"
    actions:
      - type: BONUS_DROP
        value: "{level} * 2"
        excluded-blocks:
          - ANCIENT_DEBRIS
        excluded-block-groups:
          - SHULKER_BOX
      - type: PARTICLE
        particle: "FIREWORK"
        count: 8
        offset: "0.35"
        at: "BLOCK"
      - type: SOUND
        sound: "entity.player.levelup"
        volume: "0.5"
        pitch: "1.8"
        at: "SELF"
