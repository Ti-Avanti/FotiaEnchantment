# ============================================
# 批量扩展附魔：矿脉丰收 (Ore Harvest)
# EN: Bulk extended enchantment: Ore Harvest (矿脉丰收)
# ============================================
# === FotiaEnchantment 100 enchantment expansion ===

id: ore_harvest
enabled: true
curse: false
max-level: 4
rarity: moonlit
group: mining
category: tools

applicable-items:
  - PICKAXE

# 矿石额外掉落附魔互斥，并与精准采集冲突，避免重复结算掉落。
# EN: Mutually exclusive with other ore bonus-drop enchantments and Silk Touch.
conflicts:
  - gem_sense
  - fortune_pulse
  - deep_prospector
  - stone_eater
  - quarry_echo
  - bountiful
  - minecraft:silk_touch

obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  enchanting-table-weight: 16
villager-trade-price-range:
  - 12
  - 32

codex-pools:
  moonlit: 16
  radiant: 6

effects:
  - trigger: MINE_ORE
    cooldown: 40
    conditions:
      - type: chance
        value: "{level} * 9"
    actions:
      - type: BONUS_DROP
        value: "{level}"
        excluded-blocks:
          - ANCIENT_DEBRIS
        excluded-block-groups:
          - SHULKER_BOX
      - type: PARTICLE
        particle: "HAPPY_VILLAGER"
        count: 8
        offset: "0.35"
        at: "BLOCK"
      - type: SOUND
        sound: "entity.experience_orb.pickup"
        volume: "0.5"
        pitch: "1.4"
        at: "SELF"
