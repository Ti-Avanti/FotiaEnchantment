# ============================================
# 雷霆重击 (Thunder Smash)
# 暴击时有概率召唤雷电劈向任意生物目标
# ============================================

# 附魔ID（唯一标识，不可重复）
id: thunder_smash

# 是否启用此附魔
enabled: true

# 最大等级
max-level: 5

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
rarity: aureate

# 所属附魔组（对应 groups.yml）
group: lightning

# 可应用的物品类型
applicable-items:
  - SWORD
  - AXE
  - MACE

# 冲突的附魔ID列表
conflicts: []

# 获取方式配置
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率，稀有度较高所以权重较低）
enchanting-table-weight: 5

# 星芒魔典抽取池配置
codex-pools:
  aureate: 12
  divine: 3

# 效果配置（核心：Trigger → Condition → Effect 管道）
effects:
  # 暴击时触发雷电
  - trigger: MELEE_ATTACK_CRITICAL
    conditions:
      # 概率触发
      - type: chance
        value: "{level} * 12"
    actions:
      # 召唤雷电
      - type: LIGHTNING
      # 额外伤害加成
      - type: DAMAGE_ADD
        value: "{level} * 2.0"
      # 播放雷鸣音效
      - type: SOUND
        sound: entity.lightning_bolt.thunder
        volume: 1.0
        pitch: 0.8
      # 电光粒子特效
      - type: PARTICLE
        particle: ELECTRIC_SPARK
        count: 20
    # 冷却时间（tick），较长冷却平衡高伤害
    cooldown: 200
