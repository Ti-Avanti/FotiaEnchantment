# ============================================
# 吸血打击 (Vampiric Strike)
# 攻击时有概率吸取目标生命值恢复自身
# ============================================

# 附魔ID（唯一标识，不可重复）
id: vampiric_strike

# 是否启用此附魔
enabled: true

# 最大等级
max-level: 3

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
rarity: moonlit

# 所属附魔组（对应 groups.yml）
group: offensive

# 可应用的物品类型
applicable-items:
  - SWORD
  - AXE

# 冲突的附魔ID列表
conflicts: []

# 获取方式配置
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率）
enchanting-table-weight: 20

# 星芒魔典抽取池配置
codex-pools:
  moonlit: 15
  radiant: 8

# 效果配置（核心：Trigger → Condition → Effect 管道）
effects:
  # 攻击时概率吸血
  - trigger: MELEE_ATTACK
    conditions:
      # 概率触发，等级越高概率越大
      - type: chance
        value: "{level} * 15"
    actions:
      # 生命窃取：按造成伤害的百分比回复生命
      - type: LIFESTEAL
        value: "{level} * 10"
      # 粒子特效：红色粒子表示吸血
      - type: PARTICLE
        particle: DAMAGE_INDICATOR
        count: 5
      # 播放吸血音效
      - type: SOUND
        sound: entity.witch.drink
        volume: 0.5
        pitch: 1.4
    # 冷却时间（tick）
    cooldown: 40
