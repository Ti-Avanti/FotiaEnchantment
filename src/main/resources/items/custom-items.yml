# 祛魔之石 - 三个等级
disenchant-stone:
  tiers:
    # 祛魔碎石 - 随机拆卸1个附魔
    tier-1:
      material: PRISMARINE_SHARD
      custom-model-data: 10020
      glow: false
      max-remove: 1
      selectable: false
      success-chance: 80
      destroy-on-fail: false
      keep-level: true
      allow-vanilla: true
      max-rarity: radiant
    # 祛魔晶石 - 可选择拆卸最多3个
    tier-2:
      material: PRISMARINE_CRYSTALS
      custom-model-data: 10021
      glow: true
      max-remove: 3
      selectable: true
      success-chance: 90
      destroy-on-fail: false
      keep-level: true
      allow-vanilla: true
      max-rarity: aureate
    # 祛魔神石 - 可选择拆卸最多5个，100%成功
    tier-3:
      material: HEART_OF_THE_SEA
      custom-model-data: 10022
      glow: true
      max-remove: 5
      selectable: true
      success-chance: 100
      destroy-on-fail: false
      keep-level: true
      allow-vanilla: true
      max-rarity: divine
