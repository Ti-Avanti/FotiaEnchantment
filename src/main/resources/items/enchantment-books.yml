# ============================================
# 自定义附魔书外观配置
# ============================================
# 这里控制实际产出的自定义附魔书外观：
# - 星芒魔典揭示得到的附魔书
# - 祛魔石拆卸返还的附魔书
# - 村民交易生成的自定义附魔书
#
# 支持字段：
#   custom-model-data 或 modeldata: CustomModelData；填 0 或删除表示不设置
#   item-model 或 itemmodel: 1.21+ item model，如 fotiaenchantment:radiant_book
#   tooltip-style: 1.21+ tooltip style，如 minecraft:enchanted_book
#
# default 会作为所有稀有度的默认值，具体稀有度配置会覆盖 default。
# ============================================

default:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

dustlight:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

moonlit:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

radiant:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

aureate:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

divine:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""
