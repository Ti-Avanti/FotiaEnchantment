# ============================================
# 原版附魔覆盖: 锋利 (Sharpness)
# 修改原版附魔的属性和行为
# ============================================

# 是否禁用此原版附魔
# 设为 true 后该附魔将无法通过任何方式获得
disabled: false

# 覆盖最大等级（-1 表示不修改，使用原版默认值）
max-level: 10

# 额外冲突的附魔ID列表（包含原版和自定义附魔）
conflicts:
  - smite
  - bane_of_arthropods

# 覆盖适用物品类型（留空表示不修改）
applicable-items:
  - SWORD
  - AXE
  - MACE

# 附魔台权重（-1 表示不修改）
# 权重越高在附魔台出现概率越大
enchanting-table-weight: 15

# lore 接管时显示的原版附魔名称
display-name: "锋利"

# lore 接管时显示在名称下一行的描述
description:
  - "提高近战攻击造成的伤害。"
