# ============================================
# 原版附魔覆盖: 经验修补 (Mending)
# 示例: 限制最大等级为1，增加冲突
# ============================================

# 是否禁用此原版附魔
disabled: false

# 覆盖最大等级（-1 表示不修改，使用原版默认值）
max-level: 1

# 额外冲突的附魔ID列表
conflicts:
  - infinity

# 覆盖适用物品类型（留空表示不修改）
applicable-items: []

# 附魔台权重（-1 表示不修改）
enchanting-table-weight: 2

# lore 接管时显示的原版附魔名称
display-name: "经验修补"

# lore 接管时显示在名称下一行的描述
description:
  - "拾取经验时修复带有该附魔的物品。"
