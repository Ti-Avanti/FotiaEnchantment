# ============================================
# FotiaEnchantment 全局配置
# ============================================

# 单件装备最大附魔数量
max-enchantments-per-item: 8

# 默认语言（玩家客户端语言无对应翻译时回退到此语言）
default-language: zh_cn

# 是否检查更新
check-update: true

# ============================================
# GitHub Release 更新检测
# ============================================
update-checker:
  # 是否启用更新检测。保留上方 check-update 是为了兼容旧配置。
  enabled: true
  # GitHub 仓库所有者和仓库名，用于请求 releases/latest。
  owner: Ti-Avanti
  repository: FotiaEnchantment
  # API 地址和下载地址支持 {owner} 与 {repository} 占位符。
  api-url: "https://api.github.com/repos/{owner}/{repository}/releases/latest"
  download-url: "https://github.com/{owner}/{repository}/releases/latest"
  # 是否在插件启动后自动检测；delay 用于避开服务器启动高峰。
  check-on-startup: true
  check-delay-seconds: 5
  notify:
    # 控制台提示有新版本。
    console: true
    # 给拥有 fotia.enchantment.update 权限的在线玩家提示。
    ops: true

# ============================================
# 附魔获取方式全局开关
# 每个附魔可以在自己的配置文件中覆盖这些设置
# ============================================
obtain:
  # 是否可从附魔台获取自定义附魔
  enchanting-table: true
  # 是否可通过铁砧合成
  anvil: true
  # 是否可从村民交易获取
  villager-trade: true

# ============================================
# 附魔台自定义附魔补充抽取
# ============================================
enchanting-table:
  # 单次附魔最多额外尝试抽取多少个自定义附魔；附魔等级越高实际尝试次数越多
  custom-rolls: 3
  # 每次额外抽取的基础概率
  base-custom-chance: 0.35
  # 每级经验消耗额外增加的抽取概率
  custom-chance-per-level: 0.03
  # 每次额外抽取的最高概率
  max-custom-chance: 0.95

# ============================================
# 性能设置
# ============================================
performance:
  # TIMER类触发器检查间隔(tick)，值越大性能越好但响应越慢
  effect-check-interval: 1
  # 每tick最大效果执行数，防止卡服
  max-effects-per-tick: 50

# ============================================
# 星芒魔典配置
# ============================================
stellaris-codex:
  # 合成所需星辉残页数量
  fragment-cost: 5
  # 碎片合成随机品质权重，数值越大越容易合成出该品质；0 或负数表示不参与随机
  rarity-weights:
    dustlight: 40
    moonlit: 30
    radiant: 18
    aureate: 9
    divine: 3

# ============================================
# 道具掉落配置
# ============================================
item-drops:
  # 怪物掉落
  mob-drop:
    enabled: true
    # 全局掉落概率百分比（各怪物可单独覆盖）
    default-chance: 0.5
    # 每种怪物的掉落配置
    mobs:
      ZOMBIE:
        chance: 0.3
        items:
          - starweave-fragment
      SKELETON:
        chance: 0.3
        items:
          - starweave-fragment
      WITHER_SKELETON:
        chance: 1.0
        items:
          - starweave-fragment
          - disenchant-shard
      ENDER_DRAGON:
        chance: 100.0
        items:
          - disenchant-gem
      WITHER:
        chance: 50.0
        items:
          - disenchant-crystal
  # 挖矿掉落
  mining-drop:
    enabled: true
    blocks:
      DIAMOND_ORE:
        chance: 0.5
        items:
          - starweave-fragment
      DEEPSLATE_DIAMOND_ORE:
        chance: 0.5
        items:
          - starweave-fragment
      ANCIENT_DEBRIS:
        chance: 2.0
        items:
          - starweave-fragment
      EMERALD_ORE:
        chance: 0.3
        items:
          - starweave-fragment
